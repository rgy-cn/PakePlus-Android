        #folder-page .search-box { margin:12px 16px; flex-shrink:0; }

        #about-page .about-content .about-line { font-weight:600; }

        #entry-detail-popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.9); background:var(--popup-bg); border-radius:var(--radius); z-index:700; padding:22px; min-width:310px; max-width:94vw; max-height:80vh; overflow-y:auto; box-shadow:0 12px 36px rgba(0,0,0,0.2); opacity:0; transition:0.2s; }
        #entry-detail-popup.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
        #entry-detail-popup .detail-title { font-weight:700; text-align:center; margin-bottom:14px; font-size:1rem; color:#333; }
        #entry-detail-popup .detail-columns { display:flex; gap:14px; }

        #entry-detail-popup .detail-col.left-col h4 { color:#2a8a2a; }
        #entry-detail-popup .detail-col.right-col h4 { color:#c0392b; }
        #entry-detail-popup .detail-record { font-size:0.75rem; color:#555; padding:4px 0; line-height:1.6; border-bottom:1px dotted rgba(0,0,0,0.06); }
        #entry-detail-popup .detail-col.left-col .detail-record { text-align:left; }

        .toast { position:fixed; bottom:140px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.82); color:#fff; padding:12px 24px; border-radius:24px; font-size:0.85rem; z-index:800; pointer-events:none; opacity:0; transition:opacity 0.3s; backdrop-filter: blur(6px); }

        @media (min-width:500px) { .folder-grid-area { grid-template-columns:repeat(3,1fr); max-width:640px; margin:0 auto; } #folder-page .entries-list { max-width:640px; margin:0 auto; } }

    <script>
    (function() {
        // жҸҗеүҚи®ҫзҪ®еҗҜеҠЁз”»йқўж·ЎеҮәпјҢзЎ®дҝқеҚідҪҝеҗҺз»ӯеҮәй”ҷд№ҹиғҪе…ій—ӯ
        const $splash = document.getElementById('splash-screen');
        setTimeout(() => {
            if ($splash) {
                $splash.classList.add('fade-out');
                setTimeout(() => { if ($splash) $splash.style.display = 'none'; }, 600);
            }
        }, 2000);

        // жЈҖжҹҘ xlsx еә“жҳҜеҗҰеҠ иҪҪпјҢдҪҶдёҚдёӯж–ӯзЁӢеәҸпјҢд»…зҰҒз”ЁеҜје…ҘеҜјеҮә
        let xlsxAvailable = typeof XLSX !== 'undefined';
        if (!xlsxAvailable) {
            console.warn('xlsxеә“жңӘеҠ иҪҪпјҢеҜје…ҘеҜјеҮәеҠҹиғҪдёҚеҸҜз”ЁгҖӮиҜ·е°Ҷxlsx.full.min.jsж”ҫеңЁеҗҢзӣ®еҪ•дёӢгҖӮ');
        }

        const STORAGE_KEY = 'renqing_data_v2';
        const PRESET_FOLDERS = [
            { name: 'з»“е©ҡ', emoji: 'рҹ’’' },
            { name: 'д№”иҝҒ', emoji: 'рҹҸ ' },
            { name: 'ж»ЎжңҲ', emoji: 'рҹ‘¶' },
            { name: 'зҘқеҜҝ', emoji: 'рҹҺӮ' },
            { name: 'еҚҮеӯҰ', emoji: 'рҹҺ“' },

        ];

        const $overlay = $('global-overlay');
        const $toast = $('toast');
        const $barGreen = $('bar-green');
        const $barRed = $('bar-red');
        const $lblIncomeAmt = $('lbl-income-amt');
        const $lblExpenseAmt = $('lbl-expense-amt');
        const $folderPage = $('folder-page');
        const $folderDetailTitle = $('folder-detail-title');
        const $entriesList = $('entries-list');

        let currentTab = 'income';
        let currentPage = 'main';

        let appData = { incomeFolders: [], expenseFolders: [] };

        let toastTimer = null;

        function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2,9); }
        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const d = JSON.parse(raw);
                    appData.incomeFolders = d.incomeFolders || [];
                    appData.expenseFolders = d.expenseFolders || [];
                } else initPresetData();
            } catch (e) { initPresetData(); }
            ensurePresetFolders();
        }
        function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) { showToast('вҡ пёҸ еӯҳеӮЁз©әй—ҙдёҚи¶і'); } }
        function initPresetData() {
            appData.incomeFolders = PRESET_FOLDERS.map(f => ({ id: generateId(), name: f.name, emoji: f.emoji, entries: [] }));
            appData.expenseFolders = PRESET_FOLDERS.map(f => ({ id: generateId(), name: f.name, emoji: f.emoji, entries: [] }));
            saveData();
        }
        function ensurePresetFolders() {
            PRESET_FOLDERS.forEach(pf => {
                if (!appData.incomeFolders.find(f => f.name === pf.name)) appData.incomeFolders.push({ id: generateId(), name: pf.name, emoji: pf.emoji, entries: [] });
                if (!appData.expenseFolders.find(f => f.name === pf.name)) appData.expenseFolders.push({ id: generateId(), name: pf.name, emoji: pf.emoji, entries: [] });
            });
            saveData();
        }
        function getCurrentFolders() { return currentTab === 'income' ? appData.incomeFolders : appData.expenseFolders; }
        function getFolderById(folderId) {
            let f = appData.incomeFolders.find(x => x.id === folderId);
            if (f) return { folder: f, type: 'income' };
            f = appData.expenseFolders.find(x => x.id === folderId);
            return f ? { folder: f, type: 'expense' } : null;
        }
        function getTotalIncome() { let t=0; appData.incomeFolders.forEach(f => f.entries.forEach(e => t += parseFloat(e.amount)||0)); return t; }
        function getTotalExpense() { let t=0; appData.expenseFolders.forEach(f => f.entries.forEach(e => t += parseFloat(e.amount)||0)); return t; }
        function getFolderTotal(folder) { let t=0; folder.entries.forEach(e => t += parseFloat(e.amount)||0); return t; }

        function showToast(msg) {
            if (toastTimer) clearTimeout(toastTimer);
            $toast.textContent = msg; $toast.classList.add('show');
            toastTimer = setTimeout(() => { $toast.classList.remove('show'); toastTimer=null; }, 1800);
        }

        function showPopupMenu(x,y,target) {
            popupTarget = target; popupMenuVisible = true;
            $popupMenu.querySelector('[data-action="edit"]').textContent = target.type==='folder'?'вңҸпёҸ дҝ®ж”№ж–Үд»¶еӨ№':'вңҸпёҸ дҝ®ж”№жқЎзӣ®';
            $popupMenu.querySelector('[data-action="delete"]').textContent = target.type==='folder'?'рҹ—‘пёҸ еҲ йҷӨж–Үд»¶еӨ№':'рҹ—‘пёҸ еҲ йҷӨжқЎзӣ®';
            $popupMenu.classList.add('show'); $overlay.classList.add('show');
            const mw = $popupMenu.offsetWidth||130, mh = $popupMenu.offsetHeight||90;
            let left = x - mw/2, top = y - mh - 10;
            if (left < 8) left = 8;
            if (left + mw > window.innerWidth-8) left = window.innerWidth - mw - 8;
            if (top < 60) top = y + 20;
            if (top + mh > window.innerHeight-20) top = window.innerHeight - mh - 20;
            $popupMenu.style.left = left + 'px'; $popupMenu.style.top = top + 'px';
        }
        function hidePopupMenu() { popupMenuVisible=false; popupTarget=null; $popupMenu.classList.remove('show'); $overlay.classList.remove('show'); }
        function hideEntryDetailPopup() { entryDetailVisible=false; $entryDetailPopup.classList.remove('show'); $overlay.classList.remove('show'); }

        function updateBarChart() {
            const totalIn = getTotalIncome(), totalEx = getTotalExpense();
            $lblIncomeAmt.textContent = totalIn.toFixed(0);
            $lblExpenseAmt.textContent = totalEx.toFixed(0);
            if (totalIn===0 && totalEx===0) { $barGreen.style.width='100%'; $barRed.style.width='0%'; }
            else if (totalIn===0 && totalEx>0) { $barGreen.style.width='0%'; $barRed.style.width='100%'; }
            else if (totalEx===0) { $barGreen.style.width='100%'; $barRed.style.width='0%'; }
            else {
                let redPct = (totalEx/totalIn)*100;
                if (redPct > 100) redPct=100; if (redPct < 0) redPct=0;
                $barGreen.style.width = (100-redPct) + '%';
                $barRed.style.width = redPct + '%';
            }
        }

        function renderFolderGrid() {
            const folders = getCurrentFolders();
            $folderGrid.innerHTML = '';
            if (folders.length===0) { $folderGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#bbb;padding:60px 0;">жҡӮж— ж–Үд»¶еӨ№пјҢзӮ№еҮ»еҸідёӢи§’+ж–°еўһ</div>'; }
            folders.forEach(folder => {
                const card = document.createElement('div'); card.className = 'folder-card'; card.setAttribute('data-folder-id', folder.id);
                const total = getFolderTotal(folder), count = folder.entries.length;
                card.innerHTML = `<div class="folder-emoji">${folder.emoji}</div><div class="folder-name">${folder.name}</div><div class="folder-stats">${count}з¬”и®°еҪ• е…ұ${total.toFixed(0)}е…ғ</div>`;
                card.addEventListener('click', (e) => {
                    if (popupMenuVisible) { hidePopupMenu(); return; }
                    if (entryDetailVisible) { hideEntryDetailPopup(); return; }
                    openFolder(folder.id);
                });
                let lpTimer = null, tsPos = { x:0, y:0 };
                const startLP = (x,y) => { tsPos={x,y}; lpTimer=setTimeout(() => { showPopupMenu(tsPos.x, tsPos.y, { type:'folder', id:folder.id }); lpTimer=null; }, 600); };
                card.addEventListener('touchstart', e => startLP(e.touches[0].clientX, e.touches[0].clientY), { passive:true });
                card.addEventListener('touchend', () => { if (lpTimer) clearTimeout(lpTimer); });
                card.addEventListener('touchmove', () => { if (lpTimer) clearTimeout(lpTimer); });
                card.addEventListener('mousedown', e => startLP(e.clientX, e.clientY));
                card.addEventListener('mouseup', () => { if (lpTimer) clearTimeout(lpTimer); });
                card.addEventListener('mouseleave', () => { if (lpTimer) clearTimeout(lpTimer); });
                $folderGrid.appendChild(card);
            });
            updateBarChart();
        }

        function openFolder(folderId) {
            const res = getFolderById(folderId); if (!res) return;
            currentFolderId = folderId; currentPage = 'folder';
            $folderPage.classList.add('show'); $folderDetailTitle.textContent = res.folder.emoji + ' ' + res.folder.name;

        }
        function closeFolder() {
            currentPage='main'; currentFolderId=null; $folderPage.classList.remove('show');
            $bottomNav.style.display = ''; $fabAdd.style.display = '';
            hidePopupMenu(); hideEntryDetailPopup(); renderFolderGrid(); updateBarChart();
        }
        function getCurrentFolderObj() { return currentFolderId ? getFolderById(currentFolderId) : null; }

        function renderEntries(searchTerm='') {
            const res = getCurrentFolderObj(); if (!res) return;
            let entries = res.folder.entries;
            if (searchTerm.trim()) entries = entries.filter(e => e.name.includes(searchTerm.trim()));
            $entriesList.innerHTML = '';
            if (entries.length===0) { $entriesList.innerHTML = '<div class="no-entries">жҡӮж— и®°еҪ•</div>'; }
            entries.forEach(entry => {
                const item = document.createElement('div'); item.className = 'entry-item'; item.setAttribute('data-entry-id', entry.id);
                item.innerHTML = `<div class="entry-left"><span class="entry-name">${escapeHtml(entry.name)}</span><span class="entry-note">${escapeHtml(entry.note||'')}</span></div><div class="entry-right"><span class="entry-amount">${parseFloat(entry.amount).toFixed(2)}е…ғ</span><span class="entry-date">${entry.date}</span></div>`;

                item.addEventListener('click', function(e) {

                    showEntryDetailPopup(entry.name);

                let lpTimer = null, tsPos = { x:0, y:0 };
                const startLP = (x,y) => { tsPos={x,y}; lpTimer=setTimeout(() => { showPopupMenu(tsPos.x, tsPos.y, { type:'entry', id:entry.id, folderId:currentFolderId }); lpTimer=null; }, 600); };
                item.addEventListener('touchstart', e => startLP(e.touches[0].clientX, e.touches[0].clientY), { passive:true });
                item.addEventListener('touchend', () => { if (lpTimer) clearTimeout(lpTimer); });
                item.addEventListener('touchmove', () => { if (lpTimer) clearTimeout(lpTimer); });
                item.addEventListener('mousedown', e => startLP(e.clientX, e.clientY));
                item.addEventListener('mouseup', () => { if (lpTimer) clearTimeout(lpTimer); });
                item.addEventListener('mouseleave', () => { if (lpTimer) clearTimeout(lpTimer); });
                $entriesList.appendChild(item);
            });
        }

        function showEntryDetailPopup(personName) {
            entryDetailVisible = true;
            $detailPopupTitle.textContent = 'рҹ‘Ө ' + personName + ' зҡ„е…ЁйғЁи®°еҪ•';
            let incomeRecords = [], expenseRecords = [];
            appData.incomeFolders.forEach(f => f.entries.forEach(e => { if(e.name===personName) incomeRecords.push({folderName:f.name, amount:e.amount, date:e.date}); }));
            appData.expenseFolders.forEach(f => f.entries.forEach(e => { if(e.name===personName) expenseRecords.push({folderName:f.name, amount:e.amount, date:e.date}); }));
            $detailLeftRecords.innerHTML = incomeRecords.length===0 ? '<div style="color:#bbb;font-size:0.7rem;text-align:center;">ж— и®°еҪ•</div>' : incomeRecords.map(r => `<div class="detail-record">рҹ“Ғ${r.folderName} | рҹ’°${parseFloat(r.amount).toFixed(2)}е…ғ | рҹ“…${r.date}</div>`).join('');
            $detailRightRecords.innerHTML = expenseRecords.length===0 ? '<div style="color:#bbb;font-size:0.7rem;text-align:center;">ж— и®°еҪ•</div>' : expenseRecords.map(r => `<div class="detail-record">рҹ“Ғ${r.folderName} | рҹ’ё${parseFloat(r.amount).toFixed(2)}е…ғ | рҹ“…${r.date}</div>`).join('');
            $entryDetailPopup.classList.add('show'); $overlay.classList.add('show');
        }

        function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

        document.addEventListener('click', function(e) {
            if (popupMenuVisible && !$popupMenu.contains(e.target)) hidePopupMenu();
            if (entryDetailVisible && !$entryDetailPopup.contains(e.target) && !e.target.closest('.entry-item')) hideEntryDetailPopup();
            if (e.target === $overlay) { hidePopupMenu(); hideEntryDetailPopup(); }
        });

        let touchStartX=0, touchStartY=0, gestureHandled=false;
        document.addEventListener('touchstart', e => { if(e.touches.length===1){ touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; gestureHandled=false; } }, {passive:true});
        document.addEventListener('touchend', e => {
            if(gestureHandled) return;
            if(e.changedTouches.length===1){
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                const fromLeft = touchStartX<35, fromRight = touchStartX>window.innerWidth-35;
                if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)*1.5 && ((fromLeft&&dx>0)||(fromRight&&dx<0))){
                    gestureHandled=true;
                    if(currentPage==='folder') closeFolder();
                    else if(currentPage==='about') closeAbout();
                    else if(currentPage==='main') showExitConfirm();
                }
            }
        }, {passive:true});

        function showExitConfirm(){
            const modal = document.createElement('div'); modal.className='modal-dialog show'; modal.style.zIndex='650';
            modal.innerHTML = `<div style="text-align:center;padding:10px 0;font-size:1rem;color:#333;font-weight:600;">зЎ®е®ҡйҖҖеҮәеә”з”Ёеҗ—пјҹ</div><div class="btn-row"><button class="btn btn-cancel" id="exit-cancel">еҸ–ж¶Ҳ</button><button class="btn btn-danger" id="exit-confirm">йҖҖеҮә</button></div>`;
            document.body.appendChild(modal);
            modal.querySelector('#exit-cancel').addEventListener('click', ()=>document.body.removeChild(modal));
            modal.querySelector('#exit-confirm').addEventListener('click', ()=>{
                document.body.removeChild(modal);
                if (window.__TAURI__) { window.__TAURI__.invoke('close').catch(()=>{}); return; }
                if (window.plus && window.plus.runtime) { plus.runtime.quit(); return; }
                if (window.navigator?.app?.exitApp) { window.navigator.app.exitApp(); return; }
                if (window.android?.finish) { window.android.finish(); return; }
                window.close();
                setTimeout(() => showToast('иҜ·йҖҡиҝҮзі»з»ҹж–№ејҸе…ій—ӯеә”з”Ё'), 300);
            });
            modal.addEventListener('click', function(e){ if(e.target===modal) document.body.removeChild(modal); });
        }

        function handlePopupAction(action) {
            if(!popupTarget) return;
            if(action === 'edit') {
                if(popupTarget.type === 'folder') editFolder(popupTarget.id);
                else editEntry(popupTarget.folderId, popupTarget.id);
            } else if(action === 'delete') {
                if(popupTarget.type === 'folder') deleteFolder(popupTarget.id);
                else deleteEntry(popupTarget.folderId, popupTarget.id);
            }
            hidePopupMenu();
        }
        function editFolder(folderId) {
            const res = getFolderById(folderId); if(!res) return;
            showFolderFormModal('дҝ®ж”№ж–Үд»¶еӨ№', res.folder.name, res.folder.emoji, (newName, newEmoji) => {
                res.folder.name = newName; res.folder.emoji = newEmoji; saveData();
                renderFolderGrid(); if(currentPage==='folder' && currentFolderId===folderId) $folderDetailTitle.textContent = newEmoji + ' ' + newName;
                showToast('вң… ж–Үд»¶еӨ№е·Іжӣҙж–°');
            });
        }
        function deleteFolder(folderId) {
            const res = getFolderById(folderId); if(!res) return;
            showConfirmModal(`зЎ®е®ҡеҲ йҷӨж–Үд»¶еӨ№"${res.folder.name}"еҸҠе…¶жүҖжңүи®°еҪ•еҗ—пјҹ`, () => {
                if(res.type==='income') appData.incomeFolders = appData.incomeFolders.filter(f => f.id !== folderId);
                else appData.expenseFolders = appData.expenseFolders.filter(f => f.id !== folderId);
                saveData(); if(currentPage==='folder' && currentFolderId===folderId) closeFolder();
                renderFolderGrid(); updateBarChart(); showToast('рҹ—‘пёҸ ж–Үд»¶еӨ№е·ІеҲ йҷӨ');
            });
        }
        function editEntry(folderId, entryId) {
            const res = getFolderById(folderId); if(!res) return;
            const entry = res.folder.entries.find(e => e.id === entryId); if(!entry) return;
            showEntryFormModal('дҝ®ж”№и®°еҪ•', entry.name, entry.amount, entry.date, entry.note, (name, amount, date, note) => {
                entry.name = name; entry.amount = parseFloat(amount); entry.date = date; entry.note = note;
                saveData(); renderEntries($folderSearchInput.value); renderFolderGrid(); updateBarChart(); showToast('вң… и®°еҪ•е·Іжӣҙж–°');
            });
        }
        function deleteEntry(folderId, entryId) {
            const res = getFolderById(folderId); if(!res) return;
            showConfirmModal('зЎ®е®ҡеҲ йҷӨиҜҘжқЎи®°еҪ•еҗ—пјҹ', () => {
                res.folder.entries = res.folder.entries.filter(e => e.id !== entryId);
                saveData(); renderEntries($folderSearchInput.value); renderFolderGrid(); updateBarChart(); showToast('рҹ—‘пёҸ и®°еҪ•е·ІеҲ йҷӨ');
            });
        }
        function showFolderFormModal(title, defName, defEmoji, cb) {
            const modal = document.createElement('div'); modal.className='modal-dialog show'; modal.style.zIndex='650';
            let selEmoji = defEmoji;
            modal.innerHTML = `<div class="modal-title">${title}</div><div class="form-group"><label>ж–Үд»¶еӨ№еҗҚз§°</label><input type="text" id="folder-form-name" value="${escapeHtml(defName)}" placeholder="иҜ·иҫ“е…ҘеҗҚз§°"></div><div class="form-group"><label>йҖүжӢ©еӣҫж Ү</label><div class="emoji-picker" id="emoji-picker-folder">${EMOJI_OPTIONS.map(e => `<span class="emoji-option${e===selEmoji?' selected':''}" data-emoji="${e}">${e}</span>`).join('')}</div></div><div class="btn-row"><button class="btn btn-cancel" id="modal-cancel-folder">еҸ–ж¶Ҳ</button><button class="btn btn-primary" id="modal-confirm-folder">зЎ®и®Ө</button></div>`;
            document.body.appendChild(modal);
            modal.querySelector('#emoji-picker-folder').addEventListener('click', e => {
                const opt = e.target.closest('.emoji-option'); if(!opt) return;
                modal.querySelectorAll('.emoji-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected'); selEmoji = opt.dataset.emoji;

            modal.querySelector('#modal-cancel-folder').addEventListener('click', () => document.body.removeChild(modal));
            modal.querySelector('#modal-confirm-folder').addEventListener('click', () => {
                const name = modal.querySelector('#folder-form-name').value.trim();

                document.body.removeChild(modal); cb(name, selEmoji);
            });
            modal.addEventListener('click', function(e) { if(e.target === modal) document.body.removeChild(modal); });
        }
        function showEntryFormModal(title, defName, defAmount, defDate, defNote, cb) {
            const modal = document.createElement('div'); modal.className='modal-dialog show'; modal.style.zIndex='650';
            const today = new Date().toISOString().split('T')[0]; const useDate = defDate || today;
            modal.innerHTML = `<div class="modal-title">${title}</div><div class="form-group"><label>е§“еҗҚ</label><input type="text" id="entry-form-name" value="${escapeHtml(defName||'')}" placeholder="иҜ·иҫ“е…Ҙе§“еҗҚ"></div><div class="form-group"><label>йҮ‘йўқпјҲе…ғпјү</label><input type="number" id="entry-form-amount" value="${defAmount||''}" placeholder="иҜ·иҫ“е…ҘйҮ‘йўқ" step="0.01" min="0"></div><div class="form-group"><label>ж—Ҙжңҹ</label><input type="date" id="entry-form-date" value="${useDate}"></div><div class="form-group"><label>еӨҮжіЁ</label><input type="text" id="entry-form-note" value="${escapeHtml(defNote||'')}" placeholder="еҸҜйҖүеӨҮжіЁ"></div><div class="btn-row"><button class="btn btn-cancel" id="modal-cancel-entry">еҸ–ж¶Ҳ</button><button class="btn btn-primary" id="modal-confirm-entry">зЎ®и®Ө</button></div>`;
            document.body.appendChild(modal);
            modal.querySelector('#modal-cancel-entry').addEventListener('click', () => document.body.removeChild(modal));
            modal.querySelector('#modal-confirm-entry').addEventListener('click', () => {
                const name = modal.querySelector('#entry-form-name').value.trim();
                const amount = modal.querySelector('#entry-form-amount').value;
                const date = modal.querySelector('#entry-form-date').value;
                const note = modal.querySelector('#entry-form-note').value.trim();
                if(!name) { showToast('вҡ пёҸ иҜ·иҫ“е…Ҙе§“еҗҚ'); return; }
                if(!amount || parseFloat(amount) < 0) { showToast('вҡ пёҸ иҜ·иҫ“е…Ҙжңүж•ҲйҮ‘йўқ'); return; }
                if(!date) { showToast('вҡ пёҸ иҜ·йҖүжӢ©ж—Ҙжңҹ'); return; }
                document.body.removeChild(modal); cb(name, amount, date, note);
            });
            modal.addEventListener('click', function(e) { if(e.target === modal) document.body.removeChild(modal); });
        }
        function showConfirmModal(msg, cb) {
            const modal = document.createElement('div'); modal.className='modal-dialog show'; modal.style.zIndex='650';
            modal.innerHTML = `<div style="text-align:center;padding:10px 0;font-size:0.95rem;color:#333;">${msg}</div><div class="btn-row"><button class="btn btn-cancel" id="modal-cancel-confirm">еҸ–ж¶Ҳ</button><button class="btn btn-danger" id="modal-confirm-confirm">зЎ®и®ӨеҲ йҷӨ</button></div>`;
            document.body.appendChild(modal);
            modal.querySelector('#modal-cancel-confirm').addEventListener('click', () => document.body.removeChild(modal));
            modal.querySelector('#modal-confirm-confirm').addEventListener('click', () => { document.body.removeChild(modal); cb(); });
            modal.addEventListener('click', function(e) { if(e.target === modal) document.body.removeChild(modal); });
        }
        function addNewFolder() {
            showFolderFormModal('ж–°еўһж–Үд»¶еӨ№', '', 'рҹ“Ғ', (name, emoji) => {
                getCurrentFolders().push({ id: generateId(), name, emoji, entries: [] });
                saveData(); renderFolderGrid(); updateBarChart(); showToast('вң… ж–Үд»¶еӨ№е·ІеҲӣе»ә');
            });
        }
        function addNewEntry() {
            if(!currentFolderId) return;
            showEntryFormModal('и®°дёҖз¬”', '', '', '', '', (name, amount, date, note) => {
                const res = getCurrentFolderObj(); if(!res) return;
                res.folder.entries.push({ id: generateId(), name, amount: parseFloat(amount), date, note });
                saveData(); renderEntries($folderSearchInput.value); renderFolderGrid(); updateBarChart(); showToast('вң… и®°еҪ•е·Іж·»еҠ ');
            });
        }
        function exportData() {
            if (!xlsxAvailable) { showToast('вҡ пёҸ зјәе°‘xlsxеә“пјҢж— жі•еҜјеҮә'); return; }
            const rows = [];
            appData.incomeFolders.forEach(f => f.entries.forEach(e => rows.push({ 'зұ»еһӢ': 'ж”¶е…Ҙ', 'ж–Үд»¶еӨ№еҗҚ': f.name, 'е§“еҗҚ': e.name, 'йҮ‘йўқ': parseFloat(e.amount), 'ж—Ҙжңҹ': e.date, 'еӨҮжіЁ': e.note || '' })));
            appData.expenseFolders.forEach(f => f.entries.forEach(e => rows.push({ 'зұ»еһӢ': 'ж”ҜеҮә', 'ж–Үд»¶еӨ№еҗҚ': f.name, 'е§“еҗҚ': e.name, 'йҮ‘йўқ': parseFloat(e.amount), 'ж—Ҙжңҹ': e.date, 'еӨҮжіЁ': e.note || '' })));
            if(rows.length===0) { showToast('вҡ пёҸ жІЎжңүж•°жҚ®еҸҜеҜјеҮә'); return; }
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'дәәжғ…еҫҖжқҘж•°жҚ®');
            const d = new Date();
            const filename = `дәәжғ…еҫҖжқҘеӨҮд»Ҫ_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.xlsx`;
            XLSX.writeFile(wb, filename);
            showToast('вң… ж•°жҚ®е·ІеҜјеҮә: ' + filename);
        }
        function importData(file) {
            if (!xlsxAvailable) { showToast('вҡ пёҸ зјәе°‘xlsxеә“пјҢж— жі•еҜје…Ҙ'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const wb = XLSX.read(e.target.result, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws);
                    if(rows.length===0) { showToast('вҡ пёҸ ж–Үд»¶дёӯжІЎжңүж•°жҚ®'); return; }
                    let imp=0, skip=0;
                    rows.forEach(row => {
                        const type = row['зұ»еһӢ'] || '';
                        const folderName = (row['ж–Үд»¶еӨ№еҗҚ']||'').toString().trim();
                        const name = (row['е§“еҗҚ']||'').toString().trim();
                        const amount = parseFloat(row['йҮ‘йўқ'])||0;
                        const date = (row['ж—Ҙжңҹ']||'').toString().trim();
                        const note = (row['еӨҮжіЁ']||'').toString().trim();
                        if(!folderName || !name || !date) return;
                        let targets = [];
                        if(type==='ж”¶е…Ҙ') targets = appData.incomeFolders.filter(f => f.name === folderName);
                        else if(type==='ж”ҜеҮә') targets = appData.expenseFolders.filter(f => f.name === folderName);
                        else targets = [...appData.incomeFolders.filter(f => f.name === folderName), ...appData.expenseFolders.filter(f => f.name === folderName)];
                        targets.forEach(folder => {
                            if(folder.entries.some(e => e.name === name)) skip++;
                            else { folder.entries.push({ id: generateId(), name, amount, date, note }); imp++; }
                        });
                    });
                    saveData(); renderFolderGrid(); updateBarChart();
                    if(currentPage==='folder') renderEntries($folderSearchInput.value);
                    showToast(`вң… еҜје…Ҙ${imp}жқЎпјҢи·іиҝҮ${skip}жқЎйҮҚеӨҚ`);
                } catch(err) { showToast('вқҢ ж–Үд»¶и§ЈжһҗеӨұиҙҘ'); }
            };
            reader.readAsArrayBuffer(file);
        }
        function triggerImport() {
            showToast('иҜ·йҖүжӢ©еӨҮд»Ҫж–Үд»¶пјҲ.xlsxпјү');
            $importFileInput.click();
        }
        function openAbout() { currentPage='about'; $aboutPage.classList.add('show'); $bottomNav.style.display='none'; $fabAdd.style.display='none'; hidePopupMenu(); hideEntryDetailPopup(); }
        function closeAbout() { currentPage='main'; $aboutPage.classList.remove('show'); $bottomNav.style.display=''; $fabAdd.style.display=''; }
        function switchTab(tab) {
            if(currentTab === tab) return;
            currentTab = tab; $navTitle.textContent = tab==='income'?'ж”¶е…Ҙ':'ж”ҜеҮә';
            document.querySelectorAll('#bottom-nav .tab-btn').forEach(b => b.classList.remove('active'));
            const active = document.querySelector(`#bottom-nav .tab-btn[data-tab="${tab}"]`);
            if(active) active.classList.add('active');
            hidePopupMenu(); hideEntryDetailPopup(); renderFolderGrid(); updateBarChart();
        }

        // з»‘е®ҡдәӢд»¶
        document.querySelectorAll('#bottom-nav .tab-btn').forEach(b => b.addEventListener('click', function() { switchTab(this.dataset.tab); }));
        $fabAdd.addEventListener('click', addNewFolder);
        $popupMenu.querySelector('[data-action="edit"]').addEventListener('click', () => handlePopupAction('edit'));
        $popupMenu.querySelector('[data-action="delete"]').addEventListener('click', () => handlePopupAction('delete'));
        document.getElementById('folder-back-btn').addEventListener('click', closeFolder);
        document.getElementById('about-back-btn').addEventListener('click', closeAbout);
        $folderSearchInput.addEventListener('input', function() { renderEntries(this.value); });
        document.getElementById('btn-add-entry').addEventListener('click', addNewEntry);
        document.getElementById('btn-backup').addEventListener('click', function() {
            hidePopupMenu(); hideEntryDetailPopup();
            const modal = document.createElement('div'); modal.className='modal-dialog show'; modal.style.zIndex='650';
            modal.innerHTML = `<div class="modal-title">ж•°жҚ®еӨҮд»ҪдёҺжҒўеӨҚ</div><div style="display:flex;flex-direction:column;gap:10px;"><button class="btn btn-primary" id="do-export" style="width:100%;">рҹ“Ө еҜјеҮәж•°жҚ® (xlsx)</button><button class="btn btn-primary" id="do-import" style="width:100%;background:#5b8c5a;">рҹ“Ҙ еҜје…Ҙж•°жҚ® (xlsx)</button><button class="btn btn-cancel" id="do-cancel-backup" style="width:100%;">еҸ–ж¶Ҳ</button></div>`;
            document.body.appendChild(modal);
            modal.querySelector('#do-export').addEventListener('click', () => { document.body.removeChild(modal); exportData(); });
            modal.querySelector('#do-import').addEventListener('click', () => { document.body.removeChild(modal); triggerImport(); });
            modal.querySelector('#do-cancel-backup').addEventListener('click', () => document.body.removeChild(modal));
            modal.addEventListener('click', function(e) { if(e.target===modal) document.body.removeChild(modal); });
        });
        document.getElementById('btn-about').addEventListener('click', openAbout);
        $importFileInput.addEventListener('change', function() {
            if(this.files && this.files[0]) {
                const file = this.files[0];
                if(!file.name.match(/\.(xlsx|xls)$/i)) { showToast('вҡ пёҸ иҜ·йҖүжӢ© .xlsx жҲ– .xls ж–Үд»¶'); this.value=''; return; }
                importData(file); this.value='';
            }
        });

        // еҲқе§ӢеҢ–
        loadData();
        renderFolderGrid();
        updateBarChart();
        $navTitle.textContent='ж”¶е…Ҙ';

        // Android иҝ”еӣһй”®
        document.addEventListener('backbutton', e => {
            e.preventDefault();
            if(currentPage==='folder') closeFolder();
            else if(currentPage==='about') closeAbout();
            else if(currentPage==='main') showExitConfirm();
        }, false);
        window.addEventListener('popstate', e => {
            if(currentPage==='folder'){ closeFolder(); e.preventDefault(); history.pushState({page:'main'},'',''); }
            else if(currentPage==='about'){ closeAbout(); e.preventDefault(); history.pushState({page:'main'},'',''); }
            else if(currentPage==='main'){ showExitConfirm(); e.preventDefault(); }
        });
        if(window.history?.pushState) history.pushState({page:'main'},'','');
    })();
    </script>
</body>
